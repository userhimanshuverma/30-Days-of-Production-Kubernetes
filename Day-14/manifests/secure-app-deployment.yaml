apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-frontend
  namespace: default
  labels:
    app: prod-frontend
    app.kubernetes.io/part-of: secure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prod-frontend
  template:
    metadata:
      labels:
        app: prod-frontend
        app.kubernetes.io/part-of: secure-app
    spec:
      containers:
      - name: frontend
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: prod-frontend
  namespace: default
  labels:
    app: prod-frontend
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: prod-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-backend
  namespace: default
  labels:
    app: prod-backend
    app.kubernetes.io/part-of: secure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prod-backend
  template:
    metadata:
      labels:
        app: prod-backend
        app.kubernetes.io/part-of: secure-app
    spec:
      containers:
      - name: backend
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
        - "apk add --no-cache netcat-openbsd && nc -lk -p 8080 -e echo 'Backend running'"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: prod-backend
  namespace: default
  labels:
    app: prod-backend
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: prod-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-postgres
  namespace: default
  labels:
    app: prod-postgres
    app.kubernetes.io/part-of: secure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prod-postgres
  template:
    metadata:
      labels:
        app: prod-postgres
        app.kubernetes.io/part-of: secure-app
    spec:
      containers:
      - name: postgres
        image: postgres:alpine
        env:
        - name: POSTGRES_PASSWORD
          value: "supersecurepassword123"
        ports:
        - containerPort: 5432
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: prod-postgres
  namespace: default
  labels:
    app: prod-postgres
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: prod-postgres
