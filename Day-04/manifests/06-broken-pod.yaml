apiVersion: v1
kind: Pod
metadata:
  name: crashloop-pod
  namespace: default
  labels:
    app: faulty
spec:
  containers:
    - name: crash-container
      image: alpine:latest
      command: ["/bin/sh", "-c"]
      args:
        - >
          echo "Booting service...";
          sleep 2;
          echo "ERROR: Database connection failed (Timeout 15000ms)";
          exit 1;
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
---
apiVersion: v1
kind: Pod
metadata:
  name: oomkilled-pod
  namespace: default
  labels:
    app: memory-leak
spec:
  containers:
    - name: memory-consumer
      image: alpine:latest
      command: ["/bin/sh", "-c"]
      args:
        - >
          echo "Simulating a memory-intensive data ingestion process...";
          # Write blocks to a ram filesystem / dev shared memory or a variable to blow the limits
          # In Alpine, we can allocate memory by creating a large string or copying files in loops
          dd if=/dev/zero of=/dev/shm/largefile bs=1M count=32;
          echo "Allocation completed.";
          sleep 100;
      resources:
        requests:
          cpu: "50m"
          memory: "16Mi"
        limits:
          cpu: "100m"
          # Set a very low limit to trigger OOMKilled when writing to /dev/shm
          memory: "20Mi"
