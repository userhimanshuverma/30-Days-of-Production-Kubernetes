apiVersion: v1
kind: Pod
metadata:
  name: shared-storage-pod
  namespace: default
  labels:
    app: multi-container-demo
spec:
  volumes:
    - name: shared-logs
      emptyDir: {}
  containers:
    - name: app-writer
      image: alpine:latest
      command: ["/bin/sh", "-c"]
      args:
        - >
          mkdir -p /var/log/app;
          while true; do
            echo "$(date) [INFO] Transaction completed successfully" >> /var/log/app/transaction.log;
            sleep 5;
          done
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log/app
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
    
    - name: log-exporter
      image: alpine:latest
      command: ["/bin/sh", "-c"]
      args:
        - >
          echo "Starting Log Exporter sidecar...";
          while [ ! -f /var/log/app/transaction.log ]; do
            echo "Waiting for transaction.log to be created..." && sleep 2;
          done;
          tail -f /var/log/app/transaction.log | grep --line-buffered "INFO";
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log/app
          readOnly: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
