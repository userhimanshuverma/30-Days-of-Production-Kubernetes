apiVersion: v1
kind: Pod
metadata:
  name: app-with-init-db
  namespace: default
  labels:
    app: secure-app
spec:
  initContainers:
    - name: wait-for-postgres
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - >
          until nc -z -w 2 db-service 5432; do
            echo "Waiting for PostgreSQL service (db-service:5432) to be ready...";
            sleep 3;
          done;
          echo "PostgreSQL is reachable. Initializing database schema...";
          sleep 2;
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
  containers:
    - name: app-server
      image: alpine:latest
      command: ["sh", "-c"]
      args: ["echo 'Starting Web Server... Ready to serve connections.' && sleep 3600"]
      ports:
        - containerPort: 80
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: db-service
  namespace: default
spec:
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  selector:
    app: db-backend
