apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-ha-alert-rules
  namespace: production-app
  labels:
    role: alert-rules
    prometheus: k8s
spec:
  groups:
  - name: kubernetes-control-plane
    rules:
    - alert: EtcdHighCommitLatency
      expr: histogram_quantile(0.99, rate(etcd_disk_backend_commit_duration_seconds_bucket[5m])) > 0.5
      for: 10m
      labels:
        severity: critical
        tier: platform
      annotations:
        summary: "etcd disk commit latency is too high"
        description: "etcd instance {{ $labels.instance }} p99 disk commit latency is {{ $value }}s, indicating disk write pressure which can cause cluster state synchronization timeouts."
    
    - alert: KubernetesAPIServerLatencyHigh
      expr: histogram_quantile(0.99, rate(apiserver_request_duration_seconds_bucket{subresource!="log"}[5m])) > 2.0
      for: 5m
      labels:
        severity: warning
        tier: platform
      annotations:
        summary: "Kubernetes API Server latency is elevated"
        description: "p99 API latency for verb {{ $labels.verb }} on resource {{ $labels.resource }} is {{ $value }}s on API instance {{ $labels.instance }}."

  - name: workload-resilience
    rules:
    - alert: PodFrequentRestarting
      expr: rate(kube_pod_container_status_restarts_total[15m]) * 900 > 3
      for: 10m
      labels:
        severity: warning
        tier: workloads
      annotations:
        summary: "Pod container restarts are high"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} restarted {{ $value }} times within the last 15 minutes."

    - alert: KubePodNotReady
      expr: kube_pod_status_phase{phase="Running"} == 1 unless kube_pod_status_ready{condition="true"} == 1
      for: 15m
      labels:
        severity: critical
        tier: workloads
      annotations:
        summary: "Pod is not in a ready state"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is in Running phase but has been not ready for over 15 minutes."

    - alert: NodeMemoryPressure
      expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
      for: 5m
      labels:
        severity: critical
        tier: platform
      annotations:
        summary: "Kubernetes Node under memory pressure"
        description: "Node {{ $labels.node }} is exhibiting MemoryPressure and might start evicting pods."
