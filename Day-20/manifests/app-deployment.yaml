apiVersion: v1
kind: Namespace
metadata:
  name: dev-env
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-config
  namespace: dev-env
data:
  APP_ENV: "development"
  LOG_LEVEL: "info"
  DB_CONNECT_TIMEOUT: "30"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: dev-env
  labels:
    app: payment-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: web-app
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Set to true in hard-security but requires tmpfs mounts
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: payment-config
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: dev-env
  labels:
    app: payment-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: payment-service
