apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
  labels:
    k8s-app: fluent-bit
data:
  # Main Fluent Bit Configuration
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        Plugins_File  plugins.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Storage.path  /var/log/fluent-bit/buffer
        Storage.sync  normal
        Storage.checksum off
        Storage.backlog.mem_limit 5M

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker_or_cri
        DB                /var/log/fluent-bit/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10
        Storage.type      filesystem

    # Filter out Kubernetes healthcheck endpoints to optimize cost
    [FILTER]
        Name    grep
        Match   kube.*
        Exclude log ^(?=.*\/healthz).*$

    # Enrich logs with Kubernetes pod/namespace labels & annotations
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    # Mask credit card sensitive patterns (PII)
    [FILTER]
        Name          modify
        Match         kube.*
        Condition     Key_Value_Matches log \b(?:\d[ -]*?){13,16}\b
        Set           pii_masked true
        # Fluent Bit supports regex modifications, here we mark the stream for post-processing/flagging

    # Send logs to central Grafana Loki instance
    [OUTPUT]
        Name            loki
        Match           kube.*
        Host            loki.logging.svc.cluster.local
        Port            3100
        Labels          job=fluentbit, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name'], container=$kubernetes['container_name']
        Auto_Kubernetes_Labels on

    # Parallel Output: Store in Elasticsearch for long-term full-text indexing
    [OUTPUT]
        Name            es
        Match           kube.*
        Host            elasticsearch.logging.svc.cluster.local
        Port            9200
        Logstash_Format On
        Logstash_Prefix k8s-logs
        Time_Key        @timestamp
        Replace_Dots    On
        Retry_Limit     False

  # Parsers Configuration
  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[F|P]) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On

    [PARSER]
        Name        docker_or_cri
        Format      regex
        # Auto-detect whether runtime is Docker (JSON wrapper) or CRI (raw string prefixed by stream tags)
        Regex       ^(?:(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[F|P]) (?<log>.*)|(?:"log":"(?<log>[^"]*)","stream":"(?<stream>[^"]*)","time":"(?<time>[^"]*)"))$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On
