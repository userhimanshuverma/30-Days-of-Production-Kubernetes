apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx # Placed in the ingress controller namespace
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
data:
  # ------------------------------------------------------------------------
  # Connection Tuning
  # ------------------------------------------------------------------------
  keep-alive: "75"
  keep-alive-requests: "10000" # High value for heavy microservices traffic
  upstream-keepalive-connections: "200" # Keep connections warm to backend pods, reducing TCP handshake overhead
  upstream-keepalive-timeout: "60"
  
  # ------------------------------------------------------------------------
  # SSL / Security Hardening
  # ------------------------------------------------------------------------
  ssl-protocols: "TLSv1.2 TLSv1.3" # Disable old TLS 1.0/1.1 protocols
  ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384"
  ssl-prefer-server-ciphers: "true"
  generate-request-id: "true" # Inject an X-Request-ID if not present
  
  # ------------------------------------------------------------------------
  # Performance Tuning
  # ------------------------------------------------------------------------
  use-gzip: "true"
  gzip-types: "text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript"
  client-max-body-size: "50m" # Max upload size
  
  # ------------------------------------------------------------------------
  # Structured Observability (JSON Log Formatting)
  # ------------------------------------------------------------------------
  # This formats NGINX logs as structured JSON to facilitate ingestion by Elasticsearch, Splunk, or Datadog
  log-format-upstream: >-
    {"time": "$time_iso8601",
    "remote_addr": "$remote_addr",
    "x_forwarded_for": "$http_x_forwarded_for",
    "request_id": "$req_id",
    "remote_user": "$remote_user",
    "bytes_sent": $bytes_sent,
    "request_time": $request_time,
    "status": $status,
    "request_query": "$args",
    "request_protocol": "$server_protocol",
    "request_method": "$request_method",
    "request_uri": "$request_uri",
    "request_length": $request_length,
    "http_referrer": "$http_referer",
    "http_user_agent": "$http_user_agent",
    "upstream_addr": "$upstream_addr",
    "upstream_status": "$upstream_status",
    "upstream_response_time": "$upstream_response_time",
    "upstream_connect_time": "$upstream_connect_time",
    "upstream_header_time": "$upstream_header_time"}
