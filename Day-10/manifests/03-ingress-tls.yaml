apiVersion: v1
kind: Secret
metadata:
  name: academy-tls-secret
  namespace: default
type: kubernetes.io/tls
# These are mock base64 keys for reference. In the lab, we will generate real ones using openssl.
data:
  tls.crt: 
  tls.key: 
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secured-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    
    # Force client redirects to HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    
    # Enforce HTTP Strict Transport Security (HSTS) headers via NGINX snippet
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
spec:
  # TLS definition bindings
  tls:
  - hosts:
    - academy.internal
    - api.academy.internal
    secretName: academy-tls-secret
  rules:
  - host: academy.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-svc
            port:
              number: 80
  - host: api.academy.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: order-api-svc
            port:
              number: 80
