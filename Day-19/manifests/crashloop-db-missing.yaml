apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-config
  namespace: default
  labels:
    app: payment-processor
data:
  DB_HOST: "postgres-prod.internal.net"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
  namespace: default
  labels:
    app: payment-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-processor
  template:
    metadata:
      labels:
        app: payment-processor
    spec:
      containers:
      - name: processor
        image: python:3.9-slim
        command: ["python", "-c"]
        args:
        - |
          import os, sys, time
          print("Initializing Payment Processor v1.2.0...", flush=True)
          db_host = os.environ.get("DB_HOST")
          db_pass = os.environ.get("DB_PASSWORD")
          if not db_host or not db_pass:
              print("FATAL CONFIG ERROR: Database credentials (DB_HOST, DB_PASSWORD) not injected!", file=sys.stderr, flush=True)
              print("Process exiting with code 1...", file=sys.stderr, flush=True)
              sys.exit(1)
          print("Connecting to Database at " + db_host + "...", flush=True)
          time.sleep(2)
          print("Connection failed: connection timed out.", file=sys.stderr, flush=True)
          sys.exit(2)
        env:
        - name: DB_HOST
          value: "postgres-prod.internal.net"
        # DB_PASSWORD env variable is intentionally omitted to simulate startup configuration crash.
        resources:
          limits:
            cpu: "200m"
            memory: "128Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
