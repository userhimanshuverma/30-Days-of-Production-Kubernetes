apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  namespace: default
  labels:
    app: order-api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-api-v1
  template:
    metadata:
      labels:
        app: order-api-v1 # Selector label is set here
        tier: backend
    spec:
      containers:
      - name: order-api
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: 8080 # Port mismatch (container is running on 80, not 8080)
  selector:
    app: order-api # Selector mismatch (pod has app: order-api-v1)
    tier: backend
