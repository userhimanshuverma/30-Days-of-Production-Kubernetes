apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-operator-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: postgres-operator-role
rules:
  # Permissions for core resources managed by the controller
- apiGroups: [""]
  resources: ["pods", "services", "persistentvolumeclaims", "configmaps", "secrets", "events"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Permissions for managing stateful workloads
- apiGroups: ["apps"]
  resources: ["statefulsets", "deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Permissions for the Custom Resource itself (PostgresCluster)
- apiGroups: ["database.production.k8s"]
  resources: ["postgresclusters"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Permissions for CR subresources (Status, Scale, Finalizers)
- apiGroups: ["database.production.k8s"]
  resources: ["postgresclusters/status", "postgresclusters/scale", "postgresclusters/finalizers"]
  verbs: ["get", "update", "patch"]
  # Permissions for Leader Election Lease locking
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: postgres-operator-role-binding
subjects:
- kind: ServiceAccount
  name: postgres-operator-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: postgres-operator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-operator
  namespace: default
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: postgres-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: postgres-operator-sa
      terminationGracePeriodSeconds: 10
      containers:
      - name: manager
        image: gcr.io/kubebuilder/kube-rbac-proxy:v0.13.1 # Sidecar to secure metrics endpoints
        args:
        - "--secure-listen-address=0.0.0.0:8443"
        - "--upstream=http://127.0.0.1:8080/"
        - "--logtostderr=true"
        - "--v=0"
        ports:
        - containerPort: 8443
          name: https
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 5m
            memory: 64Mi
      - name: operator
        image: quay.io/production-k8s-course/postgres-operator:v1.0.0
        command:
        - /manager
        args:
        - "--leader-elect"
        - "--metrics-bind-address=127.0.0.1:8080"
        - "--health-probe-bind-address=:8081"
        env:
        - name: WATCH_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: OPERATOR_NAME
          value: "postgres-operator"
        ports:
        - containerPort: 8081
          name: health
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          capabilities:
            drop:
            - ALL
