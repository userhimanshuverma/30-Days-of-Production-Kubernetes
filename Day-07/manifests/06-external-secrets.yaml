# ==========================================
# 1. AWS SECRETS MANAGER STORE EXAMPLE
# ==========================================
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager-store
  namespace: default
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          # Authenticate via EKS Service Account IAM Role (IRSA)
          serviceAccountRef:
            name: eso-sa
---
# ==========================================
# 2. HASHICORP VAULT STORE EXAMPLE
# ==========================================
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-store
  namespace: default
spec:
  provider:
    vault:
      server: "https://vault.internal.corp:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-read-role"
          serviceAccountRef:
            name: eso-sa
---
# ==========================================
# 3. EXTERNAL SECRET SYNCHRONIZATION
# ==========================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-db-secret
  namespace: default
spec:
  # The interval at which ESO reconciles/rotates the secret
  refreshInterval: "1h"
  
  # Reference to the SecretStore defined above
  secretStoreRef:
    name: aws-secretsmanager-store
    kind: SecretStore

  # The target native Kubernetes Secret to be created/updated
  target:
    name: payment-database-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      # Optional: Injected metadata labels onto the K8s Secret
      metadata:
        labels:
          app: payment-processor

  # Mappings to extract keys from the cloud provider secret payload
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: production/rds/payment-db
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: production/rds/payment-db
        property: password
---
