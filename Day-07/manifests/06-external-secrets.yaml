# ==========================================
# 5. SERVICE ACCOUNT FOR ESO AUTHENTICATION
# ==========================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-sa
  namespace: default
  annotations:
    # EKS IAM role binding annotation
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/eso-secrets-reader-role
