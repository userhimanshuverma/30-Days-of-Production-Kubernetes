apiVersion: v1
kind: Pod
metadata:
  name: dns-debug
  namespace: default
  labels:
    app: dns-debug
spec:
  containers:
  - name: netshoot
    image: nicolaka/netshoot:v0.12
    command:
    - sleep
    - "3600"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
