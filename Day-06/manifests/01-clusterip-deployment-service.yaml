apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-backend
  namespace: default
  labels:
    app: web-backend
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-backend
  template:
    metadata:
      labels:
        app: web-backend
    spec:
      containers:
      - name: hello-kubernetes
        image: paulbouwer/hello-kubernetes:1.10
        ports:
        - name: http
          containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        env:
        - name: MESSAGE
          value: "Hello from the Kubernetes Networking Backend!"
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-backend-service
  namespace: default
  labels:
    app: web-backend
spec:
  type: ClusterIP
  selector:
    app: web-backend
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
