apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-ai-service
  namespace: ai-services
  labels:
    app: fastapi-ai-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fastapi-ai-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fastapi-ai-service
    spec:
      serviceAccountName: fastapi-ai-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: fastapi-ai-service
          image: ghcr.io/userhimanshuverma/fastapi-ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              value: "postgres-ha-rw.databases.svc.cluster.local"
            - name: KAFKA_BROKER
              value: "production-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4317"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets-sync
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets-sync
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-ai-service
  namespace: ai-services
  labels:
    app: fastapi-ai-service
spec:
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: fastapi-ai-service
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastapi-ai-service-ingress
  namespace: ai-services
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - ai.platform.company.com
      secretName: fastapi-ai-tls
  rules:
    - host: ai.platform.company.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fastapi-ai-service
                port:
                  number: 80
