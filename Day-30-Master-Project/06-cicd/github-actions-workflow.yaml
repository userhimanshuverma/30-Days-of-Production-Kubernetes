name: Build and Deploy (GitOps)

on:
  push:
    branches:
      - main
    paths:
      - 'Day-30-Master-Project/09-ai-data-services/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: userhimanshuverma/fastapi-ai-service
  DEPLOYMENT_FILE: Day-30-Master-Project/09-ai-data-services/k8s-deployment.yaml

jobs:
  ci-build:
    name: Build & Push Service Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd Day-30-Master-Project/09-ai-data-services/fastapi-app
          pip install --upgrade pip
          pip install pytest flake8 -r requirements.txt || true

      - name: Lint Code
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 Day-30-Master-Project/09-ai-data-services/fastapi-app --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: Day-30-Master-Project/09-ai-data-services/fastapi-app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cd-deploy:
    name: Update GitOps manifests
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITOPS_COMMIT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Update deployment manifest tag
        run: |
          # Locate image and replace tag with GitHub commit SHA
          sed -i "s|image: ghcr.io/userhimanshuverma/fastapi-ai-service:.*|image: ghcr.io/userhimanshuverma/fastapi-ai-service:${{ github.sha }}|g" ${{ env.DEPLOYMENT_FILE }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.DEPLOYMENT_FILE }}
          git commit -m "chore(gitops): update image tag to ${{ github.sha }} [skip ci]"
          git push origin main
