apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: production-platform-gitops
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/userhimanshuverma/30-Days-of-Production-Kubernetes.git'
    targetRevision: HEAD
    path: Day-30-Master-Project/09-ai-data-services
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ai-services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
