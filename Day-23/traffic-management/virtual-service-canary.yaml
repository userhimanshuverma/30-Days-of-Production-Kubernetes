apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: backend-routing
  namespace: default
spec:
  hosts:
  - "app.example.com"
  - "backend-service"
  gateways:
  - app-gateway
  - mesh # applies internally within the cluster
  http:
  # Route 100% to canary if custom header is present (for integration testing)
  - match:
    - headers:
        x-user-type:
          exact: "beta-tester"
    route:
    - destination:
        host: backend-service
        subset: v2
  # Default weight-based traffic split
  - route:
    - destination:
        host: backend-service
        subset: v1
      weight: 90
    - destination:
        host: backend-service
        subset: v2
      weight: 10
