apiVersion: v1
kind: Namespace
metadata:
  name: linkerd-viz
  labels:
    linkerd.io/extension: viz
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: linkerd-viz-config
  namespace: linkerd-viz
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s
    scrape_configs:
    - job_name: 'linkerd-proxy'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_linkerd_io_control_plane_ns]
        action: keep
        regex: linkerd
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_linkerd_io_proxy_admin_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-api
  namespace: linkerd-viz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-api
  template:
    metadata:
      labels:
        app: metrics-api
    spec:
      containers:
      - name: metrics-api
        image: cr.l5d.io/linkerd/metrics-api:stable-2.12.4
        args:
        - -controller-namespace=linkerd
        - -log-level=info
        ports:
        - name: grpc
          containerPort: 9997
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: 500m
            memory: 250Mi
