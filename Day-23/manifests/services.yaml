apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default
  labels:
    app: frontend-app
spec:
  ports:
  - name: http-frontend
    port: 80
    targetPort: 80
  selector:
    app: frontend-app
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: default
  labels:
    app: backend-service
spec:
  ports:
  - name: http-backend
    port: 80
    targetPort: 8080
  selector:
    app: backend-service
