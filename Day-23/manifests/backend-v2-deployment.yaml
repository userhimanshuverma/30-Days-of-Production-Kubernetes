apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v2
  namespace: default
  labels:
    app: backend-service
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-service
      version: v2
  template:
    metadata:
      labels:
        app: backend-service
        version: v2
    spec:
      serviceAccountName: backend-service-account
      containers:
      - name: application
        image: hashicorp/http-echo:latest
        args:
        - "-text=Backend Service V2 (Canary)"
        - "-listen=:8080"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 300m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
