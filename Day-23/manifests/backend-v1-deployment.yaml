apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-service-account
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v1
  namespace: default
  labels:
    app: backend-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-service
      version: v1
  template:
    metadata:
      labels:
        app: backend-service
        version: v1
    spec:
      serviceAccountName: backend-service-account
      containers:
      - name: application
        image: hashicorp/http-echo:latest
        args:
        - "-text=Backend Service V1 (Stable)"
        - "-listen=:8080"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 300m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
