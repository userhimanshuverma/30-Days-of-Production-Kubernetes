apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-auditor
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-auditor-read-only
subjects:
  - kind: ServiceAccount
    name: cluster-auditor
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: view # Built-in system ClusterRole for read-only view permissions across the cluster
  apiGroup: rbac.authorization.k8s.io
