apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-app
  namespace: production
  labels:
    app: inventory
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfied: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: inventory
      containers:
      - name: api
        image: python:3.11-slim
        command: ["python", "-m", "http.server", "80"]
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-svc
  namespace: production
  labels:
    app: inventory
spec:
  selector:
    app: inventory
  ports:
  - port: 80
    targetPort: 80

---
# MCS Specification to export local service endpoints to peer clusters in the mesh
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: inventory-svc
  namespace: production
