# Cilium Helm Values (values.yaml) for enabling ClusterMesh
# Apply to kind-east and kind-west with unique cluster IDs and non-overlapping Pod CIDRs.

clustermesh:
  useAPIServer: true
  apiserver:
    # Enable internal etcd apiserver for syncing identity keys
    enabled: true
    # Secure connection ports
    port: 2379
    tls:
      auto:
        method: helm
        certValidityDuration: 8760h
  config:
    # Enabled cluster peers list
    enabled: true
    clusters:
      - name: kind-east
        address: 192.168.10.100
        port: 2379
      - name: kind-west
        address: 192.168.20.100
        port: 2379

---
# Example ConfigMap generated inside kube-system namespace representing external cluster configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: cilium-clustermesh-config
  namespace: kube-system
data:
  # Configuration file matching remote cluster ip addresses
  kind-east: |
    endpoints:
    - https://kind-east-clustermesh.internal.company.com:2379
    tls:
      ca: |
