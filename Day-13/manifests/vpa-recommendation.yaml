apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: dynamic-api-vpa
  namespace: default
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dynamic-api-service
  updatePolicy:
    # Options:
    # 1. "Off" (RecommendationOnly) - Calculates CPU/Memory recommendations but DOES NOT mutate or evict Pods. Excellent for production analysis.
    # 2. "Auto" - Automatically evicts running pods when they deviate from recommendations and injects resource values on startup.
    # 3. "Initial" - Injects recommendations only when the Pod is created, never evicting running pods.
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
    - containerName: '*'
      minAllowed:
        cpu: 100m
        memory: 128Mi
      maxAllowed:
        cpu: 4
        memory: 8Gi
      # Control which resources VPA is allowed to recommend
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsAndLimits
