apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-api-service
  namespace: default
  labels:
    app: dynamic-api
    tier: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dynamic-api
  template:
    metadata:
      labels:
        app: dynamic-api
    spec:
      containers:
      - name: web-app
        image: nginx:alpine # Using a lightweight image for fast startup
        command: ["/bin/sh", "-c"]
        # Loop simulating background load if needed or running standard server
        args:
        - |
          nginx -g "daemon off;"
        ports:
        - name: http
          containerPort: 80
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        startupProbe:
          httpGet:
            path: /
            port: 80
          failureThreshold: 30
          periodSeconds: 2
        livenessProbe:
          httpGet:
            path: /
            port: 80
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dynamic-api-service
  namespace: default
spec:
  ports:
  - name: http
    port: 80
    targetPort: 80
  selector:
    app: dynamic-api
  type: ClusterIP
