apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-order-consumer
  namespace: default
  labels:
    app: kafka-order-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kafka-order-consumer
  template:
    metadata:
      labels:
        app: kafka-order-consumer
    spec:
      containers:
      - name: consumer
        image: busybox
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Starting Kafka Order Consumer..."
          # Mocking message consumption loop
          while true; do
            echo "Processing partition records..."
            sleep 1
          done
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
# Premium KEDA (Kubernetes Event-driven Autoscaling) ScaledObject configuration.
# This scales the consumer group replicas dynamically based on consumer lag.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: kafka-consumer-scaledobject
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kafka-order-consumer
  minReplicaCount: 1
  maxReplicaCount: 8 # Limit scaling to the number of Kafka topic partitions (e.g. 8 partitions)
  cooldownPeriod: 300
  pollingInterval: 15
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: kafka-cluster-kafka-bootstrap.default.svc.cluster.local:9092
      consumerGroup: order-processing-group
      topic: market-orders
      # Scale out when cumulative lag exceeds 500 records
      lagThreshold: "500"
      activationLagThreshold: "50"
      offsetResetPolicy: latest
