apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-billing-service
  namespace: default
  labels:
    app: legacy-billing-service
    tier: backend
    cost-center: sales-ops
spec:
  replicas: 10 # Hardcoded high replica count, no HPA configured
  selector:
    matchLabels:
      app: legacy-billing-service
  template:
    metadata:
      labels:
        app: legacy-billing-service
    spec:
      containers:
      - name: billing-engine
        image: nginx:stable-alpine # Simulating application container
        resources:
          # --- THE WASTE ANTI-PATTERN ---
          # Developers blindly configured massive requests and equal limits
          # to "prevent OOMKills and CPU throttling" without benchmarking actual usage.
          # Peak utilization: CPU: 120m (3%), Memory: 250Mi (3.1%)
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 8Gi
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: legacy-billing-service
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: legacy-billing-service
