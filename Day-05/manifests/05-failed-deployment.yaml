apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor-failed
  namespace: default
  labels:
    app.kubernetes.io/name: payment-processor
    app.kubernetes.io/component: api
    version: "1.2.0-broken"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 120 # Short deadline so it fails quickly for the lab
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: payment-processor
      version: "1.2.0-broken"
  template:
    metadata:
      labels:
        app: payment-processor
        version: "1.2.0-broken"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
      - name: payment-api
        image: nginxinc/nginx-unprivileged:1.25-alpine
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        # Broken startup probe to simulate a stuck rollout
        startupProbe:
          httpGet:
            path: /healthz-broken
            port: 8080
          failureThreshold: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
