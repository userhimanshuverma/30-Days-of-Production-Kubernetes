# =====================================================================
# Spark Production Properties for Kubernetes (spark-defaults.conf)
# =====================================================================

# Master and Deploy Mode
spark.master                           k8s://https://kubernetes.default.svc
spark.submit.deployMode                cluster

# Container Image Configs
spark.kubernetes.container.image       gcr.io/spark-operator/spark-py:v3.1.1
spark.kubernetes.container.image.pullPolicy Always

# Security & RBAC Configuration
# Driver needs a service account with permissions to create/delete executor pods
spark.kubernetes.authenticate.driver.serviceAccountName spark-serviceaccount

# Resource Allocation - Driver
spark.driver.cores                     1
spark.driver.memory                    1024m
spark.driver.memoryOverhead            512m

# Resource Allocation - Executors
spark.executor.cores                   2
spark.executor.memory                  4096m
spark.executor.memoryOverhead          1024m

# Dynamic Allocation & Shuffle Optimization
# Crucial for multi-tenant data platforms to free up resources when idle
spark.dynamicAllocation.enabled        true
spark.dynamicAllocation.shuffleTracking.enabled true
spark.dynamicAllocation.shuffleTracking.timeout 60s
spark.dynamicAllocation.minExecutors   1
spark.dynamicAllocation.maxExecutors   20
spark.dynamicAllocation.initialExecutors 2
spark.dynamicAllocation.executorIdleTimeout 30s

# Node Scheduling Hardening
# Pin driver to reliable on-demand node pools and allow executors to run on Spot instances
spark.kubernetes.driver.nodeSelector   topology.kubernetes.io/zone=us-east-1a
spark.kubernetes.executor.nodeSelector instance-type=spot-optimized
spark.kubernetes.executor.tolerations  spot=true:NoSchedule

# Local Storage (Shuffle Space) Mount
# Executors perform heavy shuffles. Using emptyDir with RAM/SSD is standard.
spark.kubernetes.executor.volumes.emptyDir.spark-local-dir.mount.path /opt/spark/work-dir
spark.kubernetes.executor.volumes.emptyDir.spark-local-dir.mount.readOnly false
