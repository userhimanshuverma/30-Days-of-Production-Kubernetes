apiVersion: v1
kind: Service
metadata:
  name: airflow-postgres
  namespace: default
  labels:
    app: airflow-postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: airflow-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: airflow-postgres
  namespace: default
spec:
  serviceName: airflow-postgres
  replicas: 1
  selector:
    matchLabels:
      app: airflow-postgres
  template:
    metadata:
      labels:
        app: airflow-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:13
          env:
            - name: POSTGRES_DB
              value: airflow
            - name: POSTGRES_USER
              value: airflow
            - name: POSTGRES_PASSWORD
              value: airflow_prod_pwd_123
          ports:
            - containerPort: 5432
              name: postgres
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: postgres-db-volume
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
  volumeClaimTemplates:
    - metadata:
        name: postgres-db-volume
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: local-nvme
        resources:
          requests:
            storage: 20Gi
