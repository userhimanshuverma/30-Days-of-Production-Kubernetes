apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
leaderElection:
  leaderElect: true
  resourceName: my-custom-scheduler
  resourceNamespace: kube-system
profiles:
  # Profile 1: Default scheduling behavior
  - schedulerName: default-scheduler
  
  # Profile 2: High-Performance / Low-Latency Workloads (Prefers nodes with cached images and balanced resources)
  - schedulerName: low-latency-scheduler
    plugins:
      score:
        enabled:
        - name: NodeResourcesBalancedAllocation
          weight: 100
        - name: ImageLocality
          weight: 50
  
  # Profile 3: Cost-Optimized / Bin-Packing Workloads (Groups pods tightly on nodes to maximize density)
  - schedulerName: bin-packing-scheduler
    pluginConfig:
      - name: NodeResourcesFit
        args:
          scoringStrategy:
            type: MostAllocated
            resources:
              - name: cpu
                weight: 1
              - name: memory
                weight: 1

