apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-api
  namespace: default
  labels:
    app: customer-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-api
  template:
    metadata:
      labels:
        app: customer-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9898"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: podinfo
          image: stefanprodan/podinfo:6.4.0
          command:
            - ./podinfo
            - --port=9898
            - --level=info
          ports:
            - containerPort: 9898
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9898
            initialDelaySeconds: 2
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9898
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: customer-api
  namespace: default
  labels:
    app: customer-api
spec:
  ports:
    - port: 9898
      targetPort: 9898
      name: http
  selector:
    app: customer-api
  type: ClusterIP
