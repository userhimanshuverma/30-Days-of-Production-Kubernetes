apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'kubernetes_namespace', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-warnings'
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-critical'
        - match:
            severity: warning
          receiver: 'slack-warnings'

    inhibit_rules:
      - source_match:
          alertname: 'NodeExporterOffline'
        target_match:
          alertname: 'ContainerCpuThrottling'
        equal: ['node', 'instance']

    receivers:
      - name: 'slack-warnings'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/YOUR_WORKSPACE_ID/YOUR_CHANNEL_ID/YOUR_WEBHOOK_TOKEN'
            channel: '#alerts-k8s-warnings'
            send_resolved: true
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] Monitoring Alert (Warning)'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Severity:* {{ .Labels.severity }}
              *Active Since:* {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
              {{ end }}

      - name: 'pagerduty-critical'
        pagerduty_configs:
          - routing_key: 'pd-service-integration-key-goes-here'
            send_resolved: true
            client: 'Kubernetes Alertmanager'
            client_url: 'http://prometheus.monitoring.svc.cluster.local:9090'
            description: 'CRITICAL Alert: {{ .CommonAnnotations.summary }} - {{ .CommonAnnotations.description }}'
            severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}error{{ end }}'
